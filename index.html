<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👸 Princess Garden Adventure 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #98FB98 50%, #228B22 100%);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            text-align: center;
        }
        
        #title {
            color: white;
            font-size: 2em;
            text-shadow: 3px 3px 0 #FF69B4, -1px -1px 0 #FF69B4;
            margin-bottom: 10px;
        }
        
        #gameCanvas {
            border: 8px solid #FFD700;
            border-radius: 20px;
            background: linear-gradient(to bottom, #90EE90 0%, #32CD32 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        #score {
            color: white;
            font-size: 1.5em;
            margin-top: 10px;
            text-shadow: 2px 2px 0 #FF69B4;
        }
        
        #instructions {
            color: white;
            font-size: 1em;
            margin-top: 8px;
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1 id="title">👸 Princess Garden Adventure 🌸</h1>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <br>
        <div id="score">✨ Collected: 0 ✨</div>
        <br>
        <div id="instructions">⬆️⬇️⬅️➡️ Move | SPACE to spin & collect!</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Princess character
        let princess = {
            x: 400,
            y: 500,
            size: 35,
            speed: 5,
            color: '#FFB6C1',
            spinning: false,
            spinAngle: 0
        };

        // Collectibles with different types and colors
        const collectibleTypes = [
            { emoji: '👑', name: 'crown' },
            { emoji: '💖', name: 'heart' },
            { emoji: '⭐', name: 'star' },
            { emoji: '🌸', name: 'flower' },
            { emoji: '🍎', name: 'apple' },
            { emoji: '🦋', name: 'butterfly' }
        ];

        let collectibles = [];
        let particles = [];
        let score = 0;

        // Create a new collectible at random position
        function spawnCollectible() {
            const type = collectibleTypes[Math.floor(Math.random() * collectibleTypes.length)];
            collectibles.push({
                x: 50 + Math.random() * (canvas.width - 100),
                y: 80 + Math.random() * (canvas.height - 200),
                size: 30,
                type: type.emoji,
                floatOffset: Math.random() * Math.PI * 2,
                floatSpeed: 0.02 + Math.random() * 0.02
            });
        }

        // Create sparkle particles
        function createParticles(x, y, color) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    size: 4 + Math.random() * 6,
                    color: color || `hsl(${280 + Math.random() * 80}, 100%, 75%)`,
                    life: 1
                });
            }
        }

        // Spawn initial collectibles
        for (let i = 0; i < 15; i++) {
            spawnCollectible();
        }

        // Keyboard controls
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            
            // Space bar - spin and collect nearby items
            if (e.code === 'Space') {
                princess.spinning = true;
                
                // Collect any nearby collectibles during spin!
                const spinRange = 120;
                for (let i = collectibles.length - 1; i >= 0; i--) {
                    const c = collectibles[i];
                    const dx = princess.x - c.x;
                    const dy = princess.y - c.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < spinRange) {
                        createParticles(c.x, c.y);
                        score++;
                        document.getElementById('score').innerHTML = `✨ Collected: ${score} ✨`;
                        collectibles.splice(i, 1);
                        spawnCollectible();
                    }
                }
                
                setTimeout(() => princess.spinning = false, 300);
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // Update game state
        function update() {
            // Move princess with arrow keys
            if (keys['ArrowUp'] && princess.y > 60) princess.y -= princess.speed;
            if (keys['ArrowDown'] && princess.y < canvas.height - 50) princess.y += princess.speed;
            if (keys['ArrowLeft'] && princess.x > 40) princess.x -= princess.speed;
            if (keys['ArrowRight'] && princess.x < canvas.width - 40) princess.x += princess.speed;

            // Spin animation
            if (princess.spinning) {
                princess.spinAngle += 0.3;
            } else {
                princess.spinAngle = 0;
            }

            // Update collectibles floating animation
            collectibles.forEach(c => {
                c.floatOffset += c.floatSpeed;
                
                // Check collision with princess
                const dx = princess.x - c.x;
                const dy = princess.y - c.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < princess.size + c.size / 2) {
                    createParticles(c.x, c.y);
                    score++;
                    document.getElementById('score').innerHTML = `✨ Collected: ${score} ✨`;
                    
                    // Remove and respawn
                    const idx = collectibles.indexOf(c);
                    if (idx > -1) collectibles.splice(idx, 1);
                    spawnCollectible();
                }
            });

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        // Draw everything
        function draw() {
            // Clear canvas
            ctx.fillStyle = 'rgba(46, 139, 87, 0.95)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw some decorative grass tufts
            for (let i = 0; i < 50; i++) {
                const x = (i * 137) % canvas.width;
                const y = 200 + (i * 97) % 400;
                ctx.font = '20px Arial';
                ctx.fillText('🌿', x, y);
            }

            // Draw collectibles with floating effect
            collectibles.forEach(c => {
                const floatY = Math.sin(c.floatOffset) * 5;
                ctx.font = `${c.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Add glow effect
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 15;
                ctx.fillText(c.type, c.x, c.y + floatY);
                ctx.shadowBlur = 0;
            });

            // Draw particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });

            // Draw princess with spin animation!
            ctx.save();
            ctx.translate(princess.x, princess.y);
            if (princess.spinning) {
                ctx.rotate(princess.spinAngle);
            }
            
            // Princess crown
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.moveTo(-15, -28);
            ctx.lineTo(-10, -40);
            ctx.lineTo(0, -32);
            ctx.lineTo(10, -40);
            ctx.lineTo(15, -28);
            ctx.lineTo(5, -28);
            ctx.lineTo(0, -35);
            ctx.lineTo(-5, -28);
            ctx.closePath();
            ctx.fill();

            // Princess face/head
            ctx.fillStyle = '#FFE4C4';
            ctx.beginPath();
            ctx.arc(0, -10, 18, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(-7, -12, 3, 0, Math.PI * 2);
            ctx.arc(7, -12, 3, 0, Math.PI * 2);
            ctx.fill();

            // Smile
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, -8, 8, 0.2, Math.PI - 0.2);
            ctx.stroke();

            // Pink dress
            ctx.fillStyle = princess.spinning ? 
                `hsl(${Date.now() % 360}, 70%, 65%)` : '#FFB6C1';
            ctx.beginPath();
            ctx.moveTo(-18, 8);
            ctx.lineTo(18, 8);
            ctx.lineTo(25, 45);
            ctx.lineTo(-25, 45);
            ctx.closePath();
            ctx.fill();

            // Dress sparkles when spinning!
            if (princess.spinning) {
                ctx.fillStyle = '#FFD700';
                for (let i = 0; i < 6; i++) {
                    const angle = princess.spinAngle + (i * Math.PI / 3);
                    const px = Math.cos(angle) * 35;
                    const py = Math.sin(angle) * 35;
                    ctx.font = '12px Arial';
                    ctx.fillText('✨', px, py);
                }
            }

            ctx.restore();
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start the game!
        gameLoop();
    </script>
</body>
</html>
